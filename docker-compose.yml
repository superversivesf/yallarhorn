# Docker Compose for Yallarhorn Podcast Server
# Production configuration - use docker-compose.override.yml for development
#
# STORAGE CONFIGURATION:
# Copy .env.example to .env and customize paths for your system
# - YALLARHORN_DATA_DIR: SQLite database location
# - YALLARHORN_DOWNLOADS_DIR: Downloaded videos/audio (put on bulk storage!)
# - YALLARHORN_TEMP_DIR: Temporary processing files

services:
  app:
    image: yallarhorn:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yallarhorn
    restart: unless-stopped
    
    ports:
      - "5001:5001"
    
    volumes:
      # Configuration file (read-only)
      - ./yallarhorn.yaml:/app/yallarhorn.yaml:ro
      # Data directory - SQLite database
      - ${YALLARHORN_DATA_DIR:-./data}:/app/data
      # Downloads directory - PUT THIS ON BULK STORAGE
      - ${YALLARHORN_DOWNLOADS_DIR:-./downloads}:/app/downloads
      # Temp directory for processing
      - ${YALLARHORN_TEMP_DIR:-./temp}:/app/temp
    
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5001
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    networks:
      - yallarhorn-network
    
    labels:
      - "com.yallarhorn.description=Podcast server for YouTube channels"
      - "com.yallarhorn.version=1.0"

networks:
  yallarhorn-network:
    driver: bridge